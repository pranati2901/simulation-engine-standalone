# GoalCert VM Lab — Wazuh SIEM Stack
# Runs: Wazuh Manager + Wazuh Indexer (OpenSearch) + Wazuh Dashboard
# Requires: Docker with at least 4GB RAM allocated
#
# Usage:
#   docker compose -f docker-compose.wazuh.yml up -d
#   Dashboard: https://localhost:5601 (admin / SecretPassword)
#   Indexer API: https://localhost:9200 (admin / SecretPassword)
#   Manager API: https://localhost:55000 (wazuh-wui / MyS3cr37P450r.*-)

version: '3.8'

services:
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.9.0
    hostname: wazuh-indexer
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "bootstrap.memory_lock=true"
      - "discovery.type=single-node"
      - "plugins.security.ssl.http.enabled=false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    ports:
      - "9200:9200"
    networks:
      - goalcert-lab
    restart: unless-stopped

  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.0
    hostname: wazuh-manager
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh-api-configuration:/var/ossec/api/configuration
      - wazuh-etc:/var/ossec/etc
      - wazuh-logs:/var/ossec/logs
      - wazuh-queue:/var/ossec/queue
      - wazuh-var-multigroups:/var/ossec/var/multigroups
      - wazuh-integrations:/var/ossec/integrations
      - wazuh-active-response:/var/ossec/active-response/bin
      - wazuh-agentless:/var/ossec/agentless
      - wazuh-wodles:/var/ossec/wodles
      - filebeat-etc:/etc/filebeat
      - filebeat-var:/var/lib/filebeat
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    networks:
      - goalcert-lab
    depends_on:
      - wazuh.indexer
    restart: unless-stopped

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.9.0
    hostname: wazuh-dashboard
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh-manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    ports:
      - "5601:5601"
    networks:
      - goalcert-lab
    depends_on:
      - wazuh.indexer
      - wazuh.manager
    restart: unless-stopped

volumes:
  wazuh-indexer-data:
  wazuh-api-configuration:
  wazuh-etc:
  wazuh-logs:
  wazuh-queue:
  wazuh-var-multigroups:
  wazuh-integrations:
  wazuh-active-response:
  wazuh-agentless:
  wazuh-wodles:
  filebeat-etc:
  filebeat-var:

networks:
  goalcert-lab:
    driver: bridge
