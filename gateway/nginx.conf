# SimCore platform gateway — one origin (:80) fronting the SPA and both engines.
#   /engine/*  → SimCore FastAPI engine  (prefix stripped)
#   /api/*     → Cybersecurity (GoalCert) FastAPI engine
#   /ws/*      → Cybersecurity (GoalCert) WebSockets (upgraded)
#   everything else → the built SimCore SPA (client-side routing fallback)
server {
  listen 80;
  server_name _;

  # SPA assets can be large (three.js, chart.js, xterm)
  client_max_body_size 25m;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # ---- SimCore engine (strip the /engine prefix; X-API-Key forwarded automatically) ----
  location /engine/ {
    proxy_pass http://simcore-api:8002/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 300s;
  }

  # ---- Cybersecurity (GoalCert) engine API — keep the /api path ----
  location /api/ {
    proxy_pass http://cyber-api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 300s;
  }

  # ---- Cybersecurity (GoalCert) WebSockets — keep the /ws path, upgrade the connection ----
  location /ws/ {
    proxy_pass http://cyber-api:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ---- SimCore SPA (static) + client-side routing fallback ----
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }
}
